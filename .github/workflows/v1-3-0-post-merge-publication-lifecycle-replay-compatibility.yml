name: v1.3.0 post-merge publication lifecycle replay compatibility

on:
  push:
    branches: [main, v1.3.0-development]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publication-lifecycle-replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e '.[dev]'
      - run: git fetch --force origin --tags
      - run: python scripts/verify_v1_3_0_final_release_evidence_closure.py --require-tags
      - run: python scripts/build_v1_3_0_zenodo_publication_evidence_closure_manifest.py
      - run: git diff --exit-code -- release/v1.3.0/V1_3_0_ZENODO_PUBLICATION_EVIDENCE_CLOSURE_MANIFEST.json
      - run: python scripts/verify_v1_3_0_zenodo_publication_evidence_closure.py --require-tags
      - run: python scripts/verify_v1_3_0_post_zenodo_historical_replay_compatibility.py
      - run: python scripts/build_v1_3_0_post_merge_publication_lifecycle_replay_compatibility_manifest.py
      - run: git diff --exit-code -- release/v1.3.0/V1_3_0_POST_MERGE_PUBLICATION_LIFECYCLE_REPLAY_AND_FROZEN_ZENODO_MANIFEST_COMPATIBILITY_MANIFEST.json
      - run: python scripts/verify_v1_3_0_post_merge_publication_lifecycle_replay_compatibility.py
      - run: python -m pytest -q
      - run: git diff --check
