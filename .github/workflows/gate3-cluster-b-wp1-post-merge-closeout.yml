name: V0 OSAP Gate 3 Cluster B WP1 Post-Merge Closeout

# WP1 post-merge closeout is frozen. Automatic PR/push dispatch is disabled
# during WP2 successor work; exact historical replay remains available manually.
on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pull-requests: read

jobs:
  wp1-post-merge-closeout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git fetch --force --tags
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip jsonschema pytest
      - run: python release/v1.4.0/tools/patch_wp1_post_merge_allowlist.py --check
      - run: python scripts/build_gate3_cluster_b_wp1_post_merge_closeout.py --check
      - run: |
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            python scripts/verify_gate3_cluster_b_wp0.py --allow-main
            python scripts/verify_gate3_cluster_b_wp0_post_merge_closeout.py --allow-main
            python scripts/verify_gate3_cluster_b_wp1.py --allow-main
            python scripts/verify_gate3_cluster_b_wp1_post_merge_closeout.py --allow-main
          else
            python scripts/verify_gate3_cluster_b_wp0.py
            python scripts/verify_gate3_cluster_b_wp0_post_merge_closeout.py
            python scripts/verify_gate3_cluster_b_wp1.py
            python scripts/verify_gate3_cluster_b_wp1_post_merge_closeout.py
          fi
      - run: python -m pytest -q -p no:cacheprovider
      - run: bash -n scripts/synchronize_v1_4_0_development_wp1.sh
      - run: git diff --check eaf142089230ea5a5096ae834bf4e733d5f369aa...HEAD
      - uses: actions/upload-artifact@v4
        with:
          name: v0-osap-gate3-cluster-b-wp1-post-merge-closeout-${{ github.sha }}
          path: |
            release/v1.4.0/GATE3_CLUSTER_B_WP1_POST_MERGE_ARCHIVAL_CLOSEOUT_RECORD.json
            release/v1.4.0/GATE3_CLUSTER_B_WP1_DEVELOPMENT_BRANCH_SYNCHRONIZATION_RECORD.json
            release/v1.4.0/GATE3_CLUSTER_B_WP1_POST_MERGE_HOSTED_CI_EVIDENCE.json
            release/v1.4.0/GATE3_CLUSTER_B_WP1_POST_MERGE_FROZEN_UPSTREAM_PRESERVATION_RECORD.json
            release/v1.4.0/GATE3_CLUSTER_B_WP1_POST_MERGE_CLOSEOUT_GATES.json
            release/v1.4.0/GATE3_CLUSTER_B_WP1_POST_MERGE_SHA256SUMS.txt
          if-no-files-found: error
