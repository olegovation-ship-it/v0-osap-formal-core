name: V0 OSAP Gate 3 Cluster B WP6 Audit
on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/gate3-cluster-b-wp6.yml'
      - 'docs/gate3/cluster_b/WP6_*'
      - 'fixtures/gate3/cluster_b/wp6/**'
      - 'release/v1.4.0/GATE3_CLUSTER_B_WP6_*'
      - 'release/v1.4.0/tools/patch_wp6*'
      - 'schemas/v1.4.0/gate3_cluster_b_wp6_*'
      - 'scripts/*gate3_cluster_b_wp6*'
      - 'tests/test_gate3_cluster_b_wp6*.py'
  push:
    branches: [v1.4.0-development, main]
    paths:
      - '.github/workflows/gate3-cluster-b-wp6.yml'
      - 'docs/gate3/cluster_b/WP6_*'
      - 'fixtures/gate3/cluster_b/wp6/**'
      - 'release/v1.4.0/GATE3_CLUSTER_B_WP6_*'
      - 'release/v1.4.0/tools/patch_wp6*'
      - 'schemas/v1.4.0/gate3_cluster_b_wp6_*'
      - 'scripts/*gate3_cluster_b_wp6*'
      - 'tests/test_gate3_cluster_b_wp6*.py'
  workflow_dispatch:
permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  baseline-lock:
    name: Exact baseline and stable-tag lock
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --disable-pip-version-check pytest jsonschema
      - run: |
          python scripts/verify_gate3_cluster_b_wp6.py --job baseline-lock
  predecessor-chain:
    name: Predecessor SHA-256 chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --disable-pip-version-check pytest jsonschema
      - run: |
          python scripts/verify_gate3_cluster_b_wp6.py --job predecessor-chain
  theorem-role-dag:
    name: Theorem, role, and DAG audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --disable-pip-version-check pytest jsonschema
      - run: |
          python scripts/verify_gate3_cluster_b_wp6.py --job theorem-role-dag
  semantic-evidence:
    name: Semantic evidence thresholds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --disable-pip-version-check pytest jsonschema
      - run: |
          python scripts/verify_gate3_cluster_b_wp6.py --job semantic-evidence
  typed-lineage:
    name: Typed theorem and IPEC lineage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --disable-pip-version-check pytest jsonschema
      - run: |
          python scripts/verify_gate3_cluster_b_wp6.py --job typed-lineage
  schemas-fixtures-python:
    name: Schemas, fixtures, and Python regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --disable-pip-version-check pytest jsonschema
      - run: |
          python -m pytest -q -p no:cacheprovider
  lean-proof-holes:
    name: Lean and proof-hole firewall
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --disable-pip-version-check pytest jsonschema
      - name: Install Lean 4
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - run: |
          python scripts/check_no_proof_holes.py
                    cd lean && lake build
  coq-parity:
    name: Coq and statement parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --disable-pip-version-check pytest jsonschema
      - name: Install Coq
        run: |
          sudo apt-get update
          sudo apt-get install -y coq
      - run: |
          cd coq && make
                    cd .. && python scripts/verify_gate3_cluster_b_wp6.py --job coq-parity
      - run: git restore --source=HEAD -- coq/.Makefile.coq.d || true
  replay-claims:
    name: Replay and claim perimeter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --disable-pip-version-check pytest jsonschema
      - run: |
          python scripts/replay_gate3_cluster_b_wp6.py --check
                    python scripts/verify_gate3_cluster_b_wp6.py --job replay-claims
  decision-firewall:
    name: Decision, allowlist, and release firewall
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --disable-pip-version-check pytest jsonschema
      - run: |
          python release/v1.4.0/tools/patch_wp6_allowlist.py
                    python scripts/verify_gate3_cluster_b_wp6.py --job decision-firewall
                    git diff --check b3798367af960ff3b588778966c5e233d89e72ab --
