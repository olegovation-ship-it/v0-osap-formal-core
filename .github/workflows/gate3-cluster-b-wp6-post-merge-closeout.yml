name: V0 OSAP Gate 3 Cluster B WP6 Post-Merge Closeout
on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/gate3-cluster-b-wp6-post-merge-closeout.yml'
      - 'docs/gate3/cluster_b/WP6_POST_MERGE_*'
      - 'fixtures/gate3/cluster_b/wp6_post_merge_sync/**'
      - 'release/v1.4.0/GATE3_CLUSTER_B_WP6_POST_MERGE_*'
      - 'release/v1.4.0/GATE3_CLUSTER_B_WP6_DEVELOPMENT_BRANCH_SYNCHRONIZATION_RECORD.json'
      - 'release/v1.4.0/tools/patch_wp6_post_merge_allowlist.py'
      - 'schemas/v1.4.0/gate3_cluster_b_wp6_post_merge_*'
      - 'scripts/*wp6_post_merge*'
      - 'scripts/classify_v1_4_0_development_sync_relation_wp6.py'
      - 'scripts/synchronize_v1_4_0_development_wp6.sh'
      - 'tests/test_gate3_cluster_b_wp6_post_merge_closeout.py'
  workflow_dispatch:
permissions:
  contents: read
defaults:
  run:
    shell: bash
jobs:
  closeout-verifier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: python -m pip install --disable-pip-version-check pytest jsonschema
      - run: python scripts/verify_gate3_cluster_b_wp6_post_merge_closeout.py --package-only
  schema-ledger-replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: python -m pip install --disable-pip-version-check pytest jsonschema
      - run: python scripts/build_gate3_cluster_b_wp6_post_merge_closeout.py --check
      - run: python scripts/replay_gate3_cluster_b_wp6_post_merge_sync.py
  dedicated-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: python -m pip install --disable-pip-version-check pytest jsonschema
      - run: python -m pytest -q -p no:cacheprovider tests/test_gate3_cluster_b_wp6_post_merge_closeout.py
  proof-hole-firewall:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: python scripts/check_no_proof_holes.py
  lean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Lean 4
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - run: cd lean && lake build
  coq:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y coq
      - run: cd coq && make
      - run: git restore --source=HEAD -- coq/.Makefile.coq.d || true
  diff-and-authorization-firewall:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: python release/v1.4.0/tools/patch_wp6_post_merge_allowlist.py
      - run: git diff --check 8a692859b2e02a8c9fccc008f76bb24218716f40 --
