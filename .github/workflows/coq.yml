name: Coq

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  coq-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Coq
        run: |
          sudo apt-get update
          sudo apt-get install -y coq
      - name: Record Coq version
        run: coqc --version
      - name: Build Coq source
        working-directory: coq
        run: make
      - name: Reject proof holes
        run: python scripts/check_no_proof_holes.py
