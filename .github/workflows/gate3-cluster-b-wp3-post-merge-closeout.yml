name: V0 OSAP Gate 3 Cluster B WP3 Post-Merge Closeout

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/gate3-cluster-b-wp3-post-merge-closeout.yml'
      - 'docs/gate3/cluster_b/WP3_POST_MERGE_ARCHIVAL_CLOSEOUT_AND_DEVELOPMENT_BRANCH_SYNCHRONIZATION.md'
      - 'release/v1.4.0/GATE3_CLUSTER_B_WP2_POST_MERGE_SHA256SUMS.txt'
      - 'release/v1.4.0/GATE3_CLUSTER_B_WP3_DEVELOPMENT_BRANCH_SYNCHRONIZATION_RECORD.json'
      - 'release/v1.4.0/GATE3_CLUSTER_B_WP3_POST_MERGE_ARCHIVAL_CLOSEOUT_RECORD.json'
      - 'release/v1.4.0/GATE3_CLUSTER_B_WP3_POST_MERGE_CLOSEOUT_GATES.json'
      - 'release/v1.4.0/GATE3_CLUSTER_B_WP3_POST_MERGE_FROZEN_UPSTREAM_PRESERVATION_RECORD.json'
      - 'release/v1.4.0/GATE3_CLUSTER_B_WP3_POST_MERGE_HOSTED_CI_EVIDENCE.json'
      - 'release/v1.4.0/GATE3_CLUSTER_B_WP3_POST_MERGE_SCHEMA_BUNDLE_MANIFEST.json'
      - 'release/v1.4.0/GATE3_CLUSTER_B_WP3_POST_MERGE_SHA256SUMS.txt'
      - 'release/v1.4.0/tools/patch_wp3_post_merge_allowlist.py'
      - 'schemas/v1.4.0/gate3_cluster_b_wp3_development_branch_synchronization_record.schema.json'
      - 'schemas/v1.4.0/gate3_cluster_b_wp3_post_merge_archival_closeout_record.schema.json'
      - 'schemas/v1.4.0/gate3_cluster_b_wp3_post_merge_closeout_gates.schema.json'
      - 'schemas/v1.4.0/gate3_cluster_b_wp3_post_merge_frozen_upstream_preservation_record.schema.json'
      - 'schemas/v1.4.0/gate3_cluster_b_wp3_post_merge_hosted_ci_evidence.schema.json'
      - 'scripts/build_gate3_cluster_b_wp3.py'
      - 'scripts/build_gate3_cluster_b_wp3_post_merge_closeout.py'
      - 'scripts/capture_gate3_cluster_b_wp3_post_merge_evidence.py'
      - 'scripts/synchronize_v1_4_0_development_wp3.sh'
      - 'scripts/verify_gate3_cluster_b_wp2.py'
      - 'scripts/verify_gate3_cluster_b_wp2_post_merge_closeout.py'
      - 'scripts/verify_gate3_cluster_b_wp3.py'
      - 'scripts/verify_gate3_cluster_b_wp3_post_merge_closeout.py'
      - 'tests/test_gate3_cluster_b_wp3_post_merge_closeout.py'
  push:
    branches: [v1.4.0-development, main]
    paths:
      - '.github/workflows/gate3-cluster-b-wp3-post-merge-closeout.yml'
      - 'docs/gate3/cluster_b/WP3_POST_MERGE_ARCHIVAL_CLOSEOUT_AND_DEVELOPMENT_BRANCH_SYNCHRONIZATION.md'
      - 'release/v1.4.0/GATE3_CLUSTER_B_WP2_POST_MERGE_SHA256SUMS.txt'
      - 'release/v1.4.0/GATE3_CLUSTER_B_WP3_DEVELOPMENT_BRANCH_SYNCHRONIZATION_RECORD.json'
      - 'release/v1.4.0/GATE3_CLUSTER_B_WP3_POST_MERGE_ARCHIVAL_CLOSEOUT_RECORD.json'
      - 'release/v1.4.0/GATE3_CLUSTER_B_WP3_POST_MERGE_CLOSEOUT_GATES.json'
      - 'release/v1.4.0/GATE3_CLUSTER_B_WP3_POST_MERGE_FROZEN_UPSTREAM_PRESERVATION_RECORD.json'
      - 'release/v1.4.0/GATE3_CLUSTER_B_WP3_POST_MERGE_HOSTED_CI_EVIDENCE.json'
      - 'release/v1.4.0/GATE3_CLUSTER_B_WP3_POST_MERGE_SCHEMA_BUNDLE_MANIFEST.json'
      - 'release/v1.4.0/GATE3_CLUSTER_B_WP3_POST_MERGE_SHA256SUMS.txt'
      - 'release/v1.4.0/tools/patch_wp3_post_merge_allowlist.py'
      - 'schemas/v1.4.0/gate3_cluster_b_wp3_development_branch_synchronization_record.schema.json'
      - 'schemas/v1.4.0/gate3_cluster_b_wp3_post_merge_archival_closeout_record.schema.json'
      - 'schemas/v1.4.0/gate3_cluster_b_wp3_post_merge_closeout_gates.schema.json'
      - 'schemas/v1.4.0/gate3_cluster_b_wp3_post_merge_frozen_upstream_preservation_record.schema.json'
      - 'schemas/v1.4.0/gate3_cluster_b_wp3_post_merge_hosted_ci_evidence.schema.json'
      - 'scripts/build_gate3_cluster_b_wp3.py'
      - 'scripts/build_gate3_cluster_b_wp3_post_merge_closeout.py'
      - 'scripts/capture_gate3_cluster_b_wp3_post_merge_evidence.py'
      - 'scripts/synchronize_v1_4_0_development_wp3.sh'
      - 'scripts/verify_gate3_cluster_b_wp2.py'
      - 'scripts/verify_gate3_cluster_b_wp2_post_merge_closeout.py'
      - 'scripts/verify_gate3_cluster_b_wp3.py'
      - 'scripts/verify_gate3_cluster_b_wp3_post_merge_closeout.py'
      - 'tests/test_gate3_cluster_b_wp3_post_merge_closeout.py'
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pull-requests: read

jobs:
  wp3-post-merge-closeout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git fetch --force --tags origin
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check pytest jsonschema
      - run: python release/v1.4.0/tools/patch_wp3_post_merge_allowlist.py --check
      - run: python release/v1.4.0/tools/patch_wp2_post_merge_allowlist.py --check
      - run: python scripts/build_gate3_cluster_b_wp2_post_merge_closeout.py --check
      - run: python scripts/verify_gate3_cluster_b_wp2.py
      - run: python scripts/build_gate3_cluster_b_wp3.py --check
      - run: python scripts/build_gate3_cluster_b_wp3_post_merge_closeout.py --check
      - run: python scripts/capture_gate3_cluster_b_wp3_post_merge_evidence.py --check
      - run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            python scripts/verify_gate3_cluster_b_wp2_post_merge_closeout.py --allow-main
            python scripts/verify_gate3_cluster_b_wp3_post_merge_closeout.py --allow-main
          else
            python scripts/verify_gate3_cluster_b_wp2_post_merge_closeout.py
            python scripts/verify_gate3_cluster_b_wp3_post_merge_closeout.py
          fi
          python scripts/verify_gate3_cluster_b_wp3.py
      - run: python -m pytest -q -p no:cacheprovider
      - run: python scripts/check_no_proof_holes.py
      - run: bash -n scripts/synchronize_v1_4_0_development_wp3.sh
      - run: git diff --check 3a3100d88772f3613192db200918d392885a3961...HEAD
      - uses: actions/upload-artifact@v4
        with:
          name: v0-osap-gate3-cluster-b-wp3-post-merge-closeout-${{ github.sha }}
          path: |
            release/v1.4.0/GATE3_CLUSTER_B_WP3_POST_MERGE_ARCHIVAL_CLOSEOUT_RECORD.json
            release/v1.4.0/GATE3_CLUSTER_B_WP3_DEVELOPMENT_BRANCH_SYNCHRONIZATION_RECORD.json
            release/v1.4.0/GATE3_CLUSTER_B_WP3_POST_MERGE_HOSTED_CI_EVIDENCE.json
            release/v1.4.0/GATE3_CLUSTER_B_WP3_POST_MERGE_FROZEN_UPSTREAM_PRESERVATION_RECORD.json
            release/v1.4.0/GATE3_CLUSTER_B_WP3_POST_MERGE_CLOSEOUT_GATES.json
            release/v1.4.0/GATE3_CLUSTER_B_WP3_POST_MERGE_SHA256SUMS.txt
          if-no-files-found: error
