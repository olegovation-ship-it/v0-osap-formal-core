name: v1.3.0 final release evidence closure

on:
  push:
    branches: [main, v1.3.0-development]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  evidence-closure-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: git fetch origin --tags --force
      - run: python scripts/build_rc1_release_inventory.py
      - run: python scripts/verify_rc1_statement_parity.py
      - run: python scripts/verify_rc1_gate_audit.py
      - run: python scripts/verify_rc1_release_closure.py --require-tags
      - run: python scripts/verify_rc1_tag_authorization.py --require-tags
      - run: python scripts/verify_rc1_release_evidence_closure.py --require-tags
      - run: python scripts/build_v1_3_0_final_release_authorization_manifest.py
      - run: python scripts/verify_v1_3_0_final_release_authorization.py --require-tags --allow-stable-tag-created
      - run: python scripts/build_v1_3_0_final_release_evidence_closure_manifest.py
      - run: python scripts/verify_v1_3_0_final_release_evidence_closure.py --require-tags
      - run: python -m pytest -q
      - run: git diff --check
      - run: git diff --exit-code -- release/v1.3.0/V1_3_0_FINAL_RELEASE_AUTHORIZATION_MANIFEST.json
      - run: git diff --exit-code -- release/v1.3.0/V1_3_0_FINAL_RELEASE_EVIDENCE_CLOSURE_MANIFEST.json
