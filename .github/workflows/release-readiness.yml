name: Release readiness

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static-readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: python scripts/check_no_proof_holes.py
      - run: v0-osap-fc1 schema-bundle
      - run: v0-osap-fc1 fixtures
      - run: python scripts/verify_manifest.py
      - name: Confirm pre-release status
        run: |
          grep -q 'pending-github-actions' release/bootstrap_manifest.json
          grep -q 'not yet created' README.md
