name: v1.3.0 post-merge legacy lifecycle compatibility

on:
  push:
    branches: [main, v1.3.0-development]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  legacy-lifecycle-compatibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e '.[dev]'
      - run: git fetch --force origin --tags
      - run: python scripts/verify_rc1_gate_audit.py
      - run: python scripts/build_v1_3_0_post_merge_legacy_lifecycle_compatibility_manifest.py
      - run: git diff --exit-code -- release/v1.3.0/V1_3_0_POST_MERGE_LEGACY_LIFECYCLE_GATE_COMPATIBILITY_AND_FROZEN_MANIFEST_REPLAY_MANIFEST.json
      - run: python scripts/verify_v1_3_0_post_merge_legacy_lifecycle_compatibility.py
      - run: python -m pytest -q
      - run: git diff --check
