
name: RC1 gate audit

on:
  push:
    branches: [main, v1.3.0-development]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rc1-gate-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: python scripts/build_rc1_release_inventory.py
      - run: python scripts/verify_rc1_statement_parity.py
      - run: python scripts/verify_rc1_gate_audit.py
      - run: python -m pytest -q
      - name: Verify generated inventory is committed and deterministic
        run: git diff --exit-code -- release/v1.3.0/RC1_THEOREM_INVENTORY.json release/v1.3.0/RC1_RELEASE_MANIFEST.json release/v1.3.0/RC1_STATEMENT_PARITY_EVIDENCE.json release/v1.3.0/RC1_GATE_AUDIT_EVIDENCE.json
