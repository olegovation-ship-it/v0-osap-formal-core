name: RC1 release closure replay

on:
  push:
    branches: [main, v1.3.0-development]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  clean-room-python-replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: python -m pytest -q
      - run: v0-osap-fc1 schema-bundle
      - run: v0-osap-fc1 fixtures
      - run: python scripts/check_no_proof_holes.py
      - run: python scripts/verify_phase1_alignment.py
      - run: python scripts/verify_phase2_expansion.py
      - run: python scripts/verify_phase2_ci_closure.py
      - run: python scripts/verify_phase3_expansion.py
      - run: python scripts/verify_phase3_ci_closure.py
      - run: python scripts/verify_phase4_expansion.py
      - run: python scripts/verify_phase4_ci_closure.py
      - run: python scripts/verify_phase5_expansion.py
      - run: python scripts/verify_phase5_ci_closure.py
      - run: python scripts/verify_phase6_expansion.py
      - run: python scripts/verify_phase6_ci_closure.py
      - name: Replay RC1 audit inventory
        run: |
          python scripts/build_rc1_release_inventory.py
          git diff --exit-code -- release/v1.3.0/RC1_RELEASE_MANIFEST.json release/v1.3.0/RC1_THEOREM_INVENTORY.json
      - run: python scripts/verify_rc1_statement_parity.py
      - run: python scripts/verify_rc1_gate_audit.py
      - name: Replay RC1 closure manifest
        run: |
          python scripts/build_rc1_release_closure_manifest.py
          git diff --exit-code -- release/v1.3.0/RC1_RELEASE_CLOSURE_MANIFEST.json
      - run: python scripts/verify_rc1_release_closure.py --require-tags
      - name: Capture clean-room replay evidence
        run: python scripts/capture_rc1_clean_room_evidence.py --status PASS
      - uses: actions/upload-artifact@v4
        with:
          name: rc1-clean-room-replay-${{ github.sha }}
          path: artifacts/rc1_clean_room_replay_evidence.json
          if-no-files-found: error

  clean-room-lean4-replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Record Lean version
        working-directory: lean
        run: lean --version
      - name: Build Lean source
        working-directory: lean
        run: lake build
      - run: python scripts/check_no_proof_holes.py

  clean-room-coq-replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Coq
        run: |
          sudo apt-get update
          sudo apt-get install -y coq
      - name: Record Coq version
        run: coqc --version
      - name: Build Coq source
        working-directory: coq
        run: make
      - run: python scripts/check_no_proof_holes.py
